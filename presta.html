<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photographe – Belleza</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Belleza&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
    <!-- Header sera chargé ici -->
    <div id="header"></div>

    <!-- Main -->
    <main>
    <section class="presta-container">
        <h1 class="presta-title">Prestations</h1>

        <!-- Grille principale -->
        <div class="presta-grid">

            <article class="presta-card featured">
                <h2>Shooting sur mesure</h2>
                <p class="presta-price">120€</p>
                <ul class="presta-list">
                    <li>• 1h</li>
                    <li>• 15 photos retouchées</li>
                </ul>
                <a href="contact.html" class="btn-outline">Book now</a>
            </article>

            <article class="presta-card featured">
                <h2>Portrait Artiste</h2>
                <p class="presta-price">à partir de 150€</p>
                <ul class="presta-list">
                    <li>• 2h-3h</li>
                </ul>
                <a href="contact.html" class="btn-outline">Book now</a>
            </article>


            <article class="presta-card featured">
                <h2>Lookbook Marque</h2>
                <p class="presta-price">300€-600€</p>
                <ul class="presta-list">
                    <li>• 3h-4h</li>
                </ul>
                <a href="contact.html" class="btn-outline">Book now</a>
            </article>

        </div>

        <!-- Carte large en dessous -->
            <article class="presta-card featured">
                <h2>Pack Créateur</h2>
                <p class="presta-price">390€</p>
                <ul class="presta-list">
                    <li>• 2 shootings par mois</li>
                    </ul>
                <a href="contact.html" class="btn-outline">Book now</a>
            </article>

    </section>
</main>


    <!-- Footer sera chargé ici -->
    <div id="footer"></div>

    <script src="assets/js/main.js"></script>
</body>
</html>
